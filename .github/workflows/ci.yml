# File: CI workflow for encoding, lint, typecheck, test, and build validation.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Encoding check (full repo)
        run: npm run check:encoding:all

      - name: TypeScript check
        run: npx tsc --noEmit -p frontend/tsconfig.json

      - name: ESLint
        run: npm run lint --prefix frontend

      - name: Vitest
        run: npm run test:run --prefix frontend

      - name: Build
        run: npm run build --prefix frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
